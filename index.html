<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의자에 앉아서 다리 펴기 타이머</title>
    <style>
        :root {
            --primary: #4F46E5;
            --exercise: #10B981;
            --rest: #F59E0B;
            --bg: #F3F4F6;
            --text-main: #1F2937;
            --text-sub: #6B7280;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 배경색 전환을 1초로 늘려 더 부드럽게 변경 */
            transition: background-color 1s ease;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background-color: var(--primary);
            transition: background-color 1s ease;
        }

        h1 {
            font-size: 24px;
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .set-counter {
            font-size: 16px;
            color: var(--text-sub);
            margin-bottom: 30px;
            font-weight: 600;
            background: #F3F4F6;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .timer-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px auto;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .circle-bg {
            fill: none;
            stroke: #E5E7EB;
            stroke-width: 12;
        }

        .circle-progress {
            fill: none;
            stroke: var(--primary);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 565;
            stroke-dashoffset: 0;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: 800;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            transition: opacity 0.3s;
        }

        /* 일시정지 시 시간 깜빡임 효과 */
        .paused-text {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .instruction {
            font-size: 18px;
            color: var(--text-main);
            margin-bottom: 30px;
            min-height: 54px;
            font-weight: 500;
            line-height: 1.5;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px 0;
            width: 100%;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            touch-action: manipulation; /* 모바일 더블탭 줌 방지 */
        }

        button:active {
            transform: scale(0.97);
        }

        button:hover {
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }

        /* 일시정지 전용 보조 버튼 스타일 */
        .btn-secondary {
            background-color: #E5E7EB;
            color: #4B5563;
            margin-top: 12px;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background-color: #D1D5DB;
            box-shadow: none;
        }

        /* 상태별 색상 클래스 */
        body.state-exercise { background-color: #ECFDF5; }
        body.state-rest { background-color: #FFFBEB; }
        
        .state-exercise .status-bar { background-color: var(--exercise); }
        .state-exercise .circle-progress { stroke: var(--exercise); }
        .state-exercise button:not(.btn-secondary) { background-color: var(--exercise); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }

        .state-rest .status-bar { background-color: var(--rest); }
        .state-rest .circle-progress { stroke: var(--rest); }
        
        .hidden {
            display: none !important;
        }

        /* 모바일 최적화 (반응형) */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }
            h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }
            .set-counter {
                font-size: 14px;
                margin-bottom: 24px;
                padding: 4px 12px;
            }
            .timer-wrapper {
                width: 160px;
                height: 160px;
                margin-bottom: 24px;
            }
            .time-display {
                font-size: 52px;
            }
            .instruction {
                font-size: 15px;
                margin-bottom: 24px;
                min-height: 45px;
            }
            button {
                font-size: 16px;
                padding: 15px 0;
            }
            .btn-secondary {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-bar" id="statusBar"></div>
        
        <h1>의자에 앉아서 다리 펴기</h1>
        <div class="set-counter" id="setCounter">준비</div>

        <div class="timer-wrapper">
            <svg class="timer-svg" viewBox="0 0 200 200">
                <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
                <circle class="circle-progress" id="progressCircle" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="time-display" id="timeDisplay">10</div>
        </div>

        <div class="instruction" id="instructionText">
            시작 버튼을 누르면 타이머가 작동합니다.<br>(총 5세트 진행)
        </div>

        <button id="mainBtn" onclick="handleButtonClick()">시작하기</button>
        <!-- 일시정지 공용 버튼 추가 -->
        <button id="pauseBtn" class="btn-secondary hidden" onclick="togglePause()">일시정지</button>
    </div>

    <script>
        const TOTAL_SETS = 5;
        const EXERCISE_TIME = 10;
        const REST_TIME = 5;

        let currentSet = 0;
        let timeLeft = 0;
        let totalTimeForPhase = 0;
        let timerInterval = null;
        let phase = 'ready'; // ready, exercise, rest, finished
        let isPaused = false;

        const timeDisplay = document.getElementById('timeDisplay');
        const setCounter = document.getElementById('setCounter');
        const instructionText = document.getElementById('instructionText');
        const mainBtn = document.getElementById('mainBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const progressCircle = document.getElementById('progressCircle');
        const body = document.body;

        const CIRCUMFERENCE = 2 * Math.PI * 90;

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'tick') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'start') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'rest') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'finish') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15);
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.3);
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.45);
                
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            }
        }

        function updateUI(isReset = false) {
            timeDisplay.innerText = timeLeft;
            
            const progress = totalTimeForPhase > 0 ? (timeLeft / totalTimeForPhase) : 0;
            const offset = CIRCUMFERENCE - (progress * CIRCUMFERENCE);

            // isReset이 true일 경우 애니메이션 없이 즉시 상태 반영 (꽉 찬 상태로 바로 시작)
            if (isReset) {
                progressCircle.style.transition = 'none';
                progressCircle.style.strokeDashoffset = offset;
                void progressCircle.offsetWidth; // Force reflow
            } else {
                progressCircle.style.transition = 'stroke-dashoffset 1s linear, stroke 1s ease';
                progressCircle.style.strokeDashoffset = offset;
            }

            if (phase === 'exercise') {
                setCounter.innerText = `${currentSet} / ${TOTAL_SETS} 세트 (운동 중)`;
                instructionText.innerHTML = "<strong>펴진상태로 10초간 유지합니다.</strong>";
                body.className = 'state-exercise';
                mainBtn.classList.add('hidden');
                pauseBtn.classList.remove('hidden');
                pauseBtn.innerText = isPaused ? "계속하기" : "일시정지";
            } else if (phase === 'rest') {
                setCounter.innerText = `${currentSet} / ${TOTAL_SETS} 세트 (휴식 중)`;
                instructionText.innerHTML = "다리를 내리고 근육을 이완시키며<br>5초간 휴식합니다.";
                body.className = 'state-rest';
                mainBtn.classList.add('hidden');
                pauseBtn.classList.remove('hidden');
                pauseBtn.innerText = isPaused ? "계속하기" : "일시정지";
            } else if (phase === 'finished') {
                setCounter.innerText = "운동 완료!";
                instructionText.innerHTML = "<strong>고생하셨어요. 틈틈이 하세요!</strong><br>건강한 다리 근육을 위해 매일 꾸준히 해주세요.";
                timeDisplay.innerText = "0";
                progressCircle.style.strokeDashoffset = CIRCUMFERENCE;
                body.className = '';
                
                mainBtn.innerText = "다시 시작";
                mainBtn.classList.remove('hidden');
                pauseBtn.classList.add('hidden');
                timeDisplay.classList.remove('paused-text');
            } else {
                setCounter.innerText = "준비";
                timeDisplay.innerText = EXERCISE_TIME;
                progressCircle.style.strokeDashoffset = 0;
                body.className = '';
                mainBtn.innerText = "시작하기";
                mainBtn.classList.remove('hidden');
                pauseBtn.classList.add('hidden');
                timeDisplay.classList.remove('paused-text');
            }
        }

        function handleButtonClick() {
            initAudio();
            if (phase === 'ready' || phase === 'finished') {
                startWorkout();
            }
        }

        function togglePause() {
            initAudio();
            // 0초에서 전환 대기 중일 때는 일시정지 무시 (버그 방지)
            if (timeLeft <= 0) return;

            isPaused = !isPaused;

            if (isPaused) {
                clearInterval(timerInterval);
                timeDisplay.classList.add('paused-text'); // 깜빡임 효과 추가
            } else {
                timerInterval = setInterval(tick, 1000);
                timeDisplay.classList.remove('paused-text'); // 깜빡임 효과 제거
            }
            updateUI();
        }

        function startWorkout() {
            currentSet = 1;
            isPaused = false;
            startExercisePhase();
        }

        function startExercisePhase() {
            phase = 'exercise';
            timeLeft = EXERCISE_TIME;
            totalTimeForPhase = EXERCISE_TIME;
            playSound('start');
            
            updateUI(true); // 세트 시작 시 애니메이션 없이 즉시 꽉 채우기
            
            clearInterval(timerInterval);
            timerInterval = setInterval(tick, 1000);
        }

        function startRestPhase() {
            phase = 'rest';
            timeLeft = REST_TIME;
            totalTimeForPhase = REST_TIME;
            playSound('rest');
            
            updateUI(true); // 휴식 시작 시 애니메이션 없이 즉시 꽉 채우기
            
            clearInterval(timerInterval);
            timerInterval = setInterval(tick, 1000);
        }

        function finishWorkout() {
            phase = 'finished';
            clearInterval(timerInterval);
            playSound('finish');
            updateUI(false);
        }

        function tick() {
            timeLeft--;
            updateUI(); // 0이 되는 순간 UI에 즉시 반영

            if (timeLeft > 0 && timeLeft <= 3) {
                playSound('tick');
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                
                // 0초 표시 및 게이지 비워짐을 보여주기 위해 1초(1000ms) 대기 후 부드럽게 다음 상태로 전환
                setTimeout(() => {
                    if (phase === 'exercise') {
                        if (currentSet >= TOTAL_SETS) {
                            finishWorkout();
                        } else {
                            startRestPhase();
                        }
                    } else if (phase === 'rest') {
                        currentSet++;
                        startExercisePhase();
                    }
                }, 1000);
            }
        }

        // 초기 세팅
        progressCircle.style.strokeDasharray = CIRCUMFERENCE;
        updateUI(true);
    </script>
</body>
</html>
